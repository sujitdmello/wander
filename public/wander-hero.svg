<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Man walking a Boston Terrier through a neighborhood">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fceabb"/>
      <stop offset="100%" stop-color="#f8b56e"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ec87e"/>
      <stop offset="100%" stop-color="#5aa65a"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="256" height="256" rx="24" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="210" cy="48" r="22" fill="#ffe8a0" opacity="0.85"/>

  <!-- distant hill -->
  <ellipse cx="128" cy="175" rx="160" ry="40" fill="#8fc98f" opacity="0.5"/>

  <!-- ground -->
  <rect y="168" width="256" height="88" fill="url(#grass)"/>

  <!-- sidewalk -->
  <rect x="0" y="196" width="256" height="24" fill="#d6c9a8" opacity="0.75"/>

  <!-- LEFT HOUSE -->
  <g transform="translate(16,108)">
    <rect width="58" height="52" rx="4" fill="#f5ede0"/>
    <polygon points="-4,4 29,-22 62,4" fill="#c0553a"/>
    <rect x="10" y="24" width="14" height="28" rx="3" fill="#8b6e54"/>
    <circle cx="21" cy="40" r="1.5" fill="#d4a84b"/>
    <rect x="34" y="18" width="16" height="14" rx="2" fill="#cde4f6"/>
    <line x1="42" y1="18" x2="42" y2="32" stroke="#a8c4dc" stroke-width="1"/>
    <line x1="34" y1="25" x2="50" y2="25" stroke="#a8c4dc" stroke-width="1"/>
    <rect x="46" y="-14" width="8" height="20" rx="2" fill="#9a5c42"/>
  </g>

  <!-- RIGHT HOUSE -->
  <g transform="translate(184,116)">
    <rect width="54" height="48" rx="4" fill="#e8f0e0"/>
    <polygon points="-4,4 27,-20 58,4" fill="#5a7eb5"/>
    <rect x="20" y="22" width="14" height="26" rx="3" fill="#6e8b6e"/>
    <circle cx="31" cy="37" r="1.5" fill="#d4a84b"/>
    <rect x="4" y="16" width="14" height="12" rx="2" fill="#cde4f6"/>
    <line x1="11" y1="16" x2="11" y2="28" stroke="#a8c4dc" stroke-width="1"/>
  </g>

  <!-- BACK HOUSE -->
  <g transform="translate(94,126)">
    <rect width="42" height="38" rx="3" fill="#fff5e6"/>
    <polygon points="-3,3 21,-16 45,3" fill="#d4864e"/>
    <rect x="15" y="16" width="12" height="22" rx="2" fill="#a08068"/>
    <rect x="4" y="12" width="10" height="10" rx="2" fill="#cde4f6"/>
  </g>

  <!-- tree left -->
  <g transform="translate(78,128)">
    <rect x="4" y="22" width="6" height="28" rx="2" fill="#7a6044"/>
    <ellipse cx="7" cy="18" rx="14" ry="18" fill="#5aaa5a"/>
    <ellipse cx="3" cy="22" rx="10" ry="13" fill="#68b868" opacity="0.8"/>
  </g>

  <!-- tree right -->
  <g transform="translate(168,132)">
    <rect x="3" y="18" width="5" height="24" rx="2" fill="#7a6044"/>
    <ellipse cx="5" cy="14" rx="12" ry="16" fill="#5aaa5a"/>
  </g>

  <!-- MAN -->
  <g transform="translate(110,156)">
    <!-- legs -->
    <path d="M2 38L-2 60L2 62" fill="none" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <path d="M6 38L12 58L16 60" fill="none" stroke="#2c3e50" stroke-width="5" stroke-linecap="round"/>
    <!-- body -->
    <rect x="-2" y="14" width="14" height="26" rx="4" fill="#3b6b8a"/>
    <!-- head -->
    <circle cx="6" cy="8" r="9" fill="#f0c29f"/>
    <!-- hair -->
    <path d="M-2 5Q6-4 14 5" fill="#5a3e2a"/>
    <ellipse cx="6" cy="2" rx="8" ry="4" fill="#5a3e2a"/>
    <!-- arm holding leash -->
    <path d="M12 18L22 32L28 36" fill="none" stroke="#3b6b8a" stroke-width="4" stroke-linecap="round"/>
    <circle cx="28" cy="36" r="2.5" fill="#f0c29f"/>
    <!-- leash -->
    <path d="M28 36Q34 42 42 42" fill="none" stroke="#8b6e54" stroke-width="1.5" stroke-linecap="round"/>
    <!-- other arm -->
    <path d="M0 18L-8 30" fill="none" stroke="#3b6b8a" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- BOSTON TERRIER -->
  <g transform="translate(152,192)">
    <!-- body -->
    <ellipse cx="8" cy="6" rx="12" ry="8" fill="#1f2428"/>
    <!-- white chest -->
    <ellipse cx="4" cy="8" rx="5" ry="5" fill="#f5f0e6"/>
    <!-- legs -->
    <path d="M16 12L18 22L20 23" fill="none" stroke="#1f2428" stroke-width="3" stroke-linecap="round"/>
    <path d="M14 12L12 22L10 23" fill="none" stroke="#1f2428" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 12L-4 22L-6 23" fill="none" stroke="#1f2428" stroke-width="3" stroke-linecap="round"/>
    <path d="M2 12L6 21L8 23" fill="none" stroke="#1f2428" stroke-width="3" stroke-linecap="round"/>
    <!-- white paws -->
    <circle cx="20" cy="23" r="1.5" fill="#f5f0e6"/>
    <circle cx="10" cy="23" r="1.5" fill="#f5f0e6"/>
    <circle cx="-6" cy="23" r="1.5" fill="#f5f0e6"/>
    <circle cx="8" cy="23" r="1.5" fill="#f5f0e6"/>
    <!-- head -->
    <circle cx="-6" cy="0" r="7" fill="#1f2428"/>
    <!-- white blaze -->
    <path d="M-9-2L-6-5L-3-2L-6 2Z" fill="#f5f0e6"/>
    <!-- muzzle -->
    <ellipse cx="-10" cy="2" rx="4" ry="3" fill="#f5f0e6"/>
    <ellipse cx="-11" cy="1.5" rx="2" ry="1.5" fill="#1f2428" opacity="0.7"/>
    <!-- nose -->
    <ellipse cx="-12" cy="1" rx="1.2" ry="0.8" fill="#333"/>
    <!-- eyes -->
    <circle cx="-8" cy="-2" r="1.5" fill="#f5f0e6"/>
    <circle cx="-8" cy="-2" r="0.8" fill="#1f2428"/>
    <circle cx="-4" cy="-2" r="1.5" fill="#f5f0e6"/>
    <circle cx="-4" cy="-2" r="0.8" fill="#1f2428"/>
    <!-- ears (erect) -->
    <polygon points="-9,-5 -11,-12 -6,-7" fill="#1f2428"/>
    <polygon points="-3,-5 -1,-12 -6,-7" fill="#1f2428"/>
    <!-- short tail -->
    <path d="M20 4L23 1" fill="none" stroke="#1f2428" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- mailbox -->
  <g transform="translate(72,196)">
    <rect x="0" y="0" width="3" height="18" rx="1" fill="#7a6044"/>
    <rect x="-3" y="-4" width="10" height="7" rx="2" fill="#c0553a"/>
    <rect x="7" y="-2" width="2" height="3" rx="0.5" fill="#d4a84b"/>
  </g>

  <!-- fence -->
  <g opacity="0.35">
    <rect x="140" y="162" width="2" height="12" fill="#a08068"/>
    <rect x="150" y="162" width="2" height="12" fill="#a08068"/>
    <rect x="160" y="162" width="2" height="12" fill="#a08068"/>
    <rect x="139" y="164" width="24" height="2" rx="1" fill="#a08068"/>
    <rect x="139" y="170" width="24" height="2" rx="1" fill="#a08068"/>
  </g>
</svg>
