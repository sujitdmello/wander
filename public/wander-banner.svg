<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Man walking a Boston Terrier through a neighborhood of houses">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fceabb"/>
      <stop offset="100%" stop-color="#f8b56e"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7ec87e"/>
      <stop offset="100%" stop-color="#5aa65a"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="960" height="280" rx="16" fill="url(#sky)"/>

  <!-- sun -->
  <circle cx="860" cy="52" r="30" fill="#ffe8a0" opacity="0.8"/>

  <!-- clouds -->
  <g opacity="0.3" fill="#fff">
    <ellipse cx="160" cy="48" rx="44" ry="14"/>
    <ellipse cx="140" cy="44" rx="28" ry="10"/>
    <ellipse cx="640" cy="38" rx="36" ry="12"/>
    <ellipse cx="660" cy="34" rx="24" ry="9"/>
  </g>

  <!-- distant hills -->
  <ellipse cx="240" cy="178" rx="220" ry="30" fill="#8fc98f" opacity="0.4"/>
  <ellipse cx="680" cy="182" rx="260" ry="28" fill="#8fc98f" opacity="0.35"/>

  <!-- ground -->
  <rect y="176" width="960" height="104" fill="url(#grass)"/>

  <!-- sidewalk -->
  <rect x="0" y="212" width="960" height="22" fill="#d6c9a8" opacity="0.7"/>

  <!-- HOUSE 1 (far left) -->
  <g transform="translate(28,104)">
    <rect width="72" height="62" rx="4" fill="#f5ede0"/>
    <polygon points="-5,5 36,-26 77,5" fill="#c0553a"/>
    <rect x="12" y="28" width="16" height="34" rx="3" fill="#8b6e54"/>
    <circle cx="24" cy="48" r="2" fill="#d4a84b"/>
    <rect x="42" y="20" width="18" height="16" rx="2" fill="#cde4f6"/>
    <line x1="51" y1="20" x2="51" y2="36" stroke="#a8c4dc" stroke-width="1"/>
    <line x1="42" y1="28" x2="60" y2="28" stroke="#a8c4dc" stroke-width="1"/>
    <rect x="56" y="-16" width="9" height="24" rx="2" fill="#9a5c42"/>
  </g>

  <!-- tree between house 1 and 2 -->
  <g transform="translate(118,118)">
    <rect x="5" y="30" width="7" height="36" rx="2" fill="#7a6044"/>
    <ellipse cx="8" cy="24" rx="18" ry="22" fill="#5aaa5a"/>
    <ellipse cx="4" cy="28" rx="13" ry="16" fill="#68b868" opacity="0.8"/>
  </g>

  <!-- HOUSE 2 -->
  <g transform="translate(162,110)">
    <rect width="82" height="56" rx="5" fill="#e8f0e0"/>
    <polygon points="-5,4 41,-24 87,4" fill="#5a7eb5"/>
    <rect x="14" y="24" width="16" height="32" rx="3" fill="#6e8b6e"/>
    <circle cx="26" cy="42" r="2" fill="#d4a84b"/>
    <rect x="44" y="18" width="20" height="14" rx="2" fill="#cde4f6"/>
    <line x1="54" y1="18" x2="54" y2="32" stroke="#a8c4dc" stroke-width="1"/>
    <line x1="44" y1="25" x2="64" y2="25" stroke="#a8c4dc" stroke-width="1"/>
  </g>

  <!-- tree -->
  <g transform="translate(264,122)">
    <rect x="4" y="24" width="6" height="32" rx="2" fill="#7a6044"/>
    <ellipse cx="7" cy="18" rx="16" ry="20" fill="#5aaa5a"/>
  </g>

  <!-- HOUSE 3 (behind the man, smaller/farther) -->
  <g transform="translate(310,118)">
    <rect width="60" height="48" rx="4" fill="#fff5e6"/>
    <polygon points="-4,4 30,-20 64,4" fill="#d4864e"/>
    <rect x="22" y="20" width="14" height="28" rx="3" fill="#a08068"/>
    <rect x="6" y="16" width="14" height="12" rx="2" fill="#cde4f6"/>
    <line x1="13" y1="16" x2="13" y2="28" stroke="#a8c4dc" stroke-width="1"/>
  </g>

  <!-- fence near center -->
  <g opacity="0.35">
    <rect x="390" y="168" width="2" height="14" fill="#a08068"/>
    <rect x="402" y="168" width="2" height="14" fill="#a08068"/>
    <rect x="414" y="168" width="2" height="14" fill="#a08068"/>
    <rect x="426" y="168" width="2" height="14" fill="#a08068"/>
    <rect x="389" y="171" width="40" height="2" rx="1" fill="#a08068"/>
    <rect x="389" y="178" width="40" height="2" rx="1" fill="#a08068"/>
  </g>

  <!-- mailbox -->
  <g transform="translate(386,208)">
    <rect x="0" y="0" width="4" height="22" rx="1" fill="#7a6044"/>
    <rect x="-4" y="-5" width="12" height="8" rx="2" fill="#c0553a"/>
    <rect x="8" y="-3" width="3" height="4" rx="0.5" fill="#d4a84b"/>
  </g>

  <!-- MAN (center of the scene) -->
  <g transform="translate(450,152)">
    <!-- legs mid-stride -->
    <path d="M2 46L-4 72L0 76" fill="none" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
    <path d="M8 46L16 70L20 74" fill="none" stroke="#2c3e50" stroke-width="6" stroke-linecap="round"/>
    <!-- shoes -->
    <ellipse cx="0" cy="77" rx="5" ry="3" fill="#3a3028"/>
    <ellipse cx="20" cy="75" rx="5" ry="3" fill="#3a3028"/>
    <!-- body -->
    <rect x="-2" y="16" width="16" height="32" rx="5" fill="#3b6b8a"/>
    <!-- head -->
    <circle cx="7" cy="8" r="11" fill="#f0c29f"/>
    <!-- hair -->
    <path d="M-3 4Q7-6 17 4" fill="#5a3e2a"/>
    <ellipse cx="7" cy="1" rx="10" ry="5" fill="#5a3e2a"/>
    <!-- eye -->
    <circle cx="11" cy="7" r="1.5" fill="#2c3e50"/>
    <!-- slight smile -->
    <path d="M10 12Q13 14 15 12" fill="none" stroke="#c49070" stroke-width="1" stroke-linecap="round"/>
    <!-- arm holding leash, reaching forward -->
    <path d="M14 22L26 38L34 42" fill="none" stroke="#3b6b8a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="34" cy="42" r="3" fill="#f0c29f"/>
    <!-- leash line -->
    <path d="M34 42Q44 50 56 50" fill="none" stroke="#8b6e54" stroke-width="2" stroke-linecap="round"/>
    <!-- other arm swinging back -->
    <path d="M0 22L-10 36" fill="none" stroke="#3b6b8a" stroke-width="5" stroke-linecap="round"/>
    <circle cx="-10" cy="36" r="3" fill="#f0c29f"/>
  </g>

  <!-- BOSTON TERRIER -->
  <g transform="translate(506,204)">
    <!-- body -->
    <ellipse cx="10" cy="6" rx="15" ry="10" fill="#1f2428"/>
    <!-- white chest -->
    <ellipse cx="4" cy="9" rx="6" ry="6" fill="#f5f0e6"/>
    <!-- back legs -->
    <path d="M20 14L22 26L24 28" fill="none" stroke="#1f2428" stroke-width="4" stroke-linecap="round"/>
    <path d="M17 14L14 26L12 28" fill="none" stroke="#1f2428" stroke-width="4" stroke-linecap="round"/>
    <!-- front legs -->
    <path d="M0 14L-5 26L-7 28" fill="none" stroke="#1f2428" stroke-width="4" stroke-linecap="round"/>
    <path d="M3 14L7 25L9 28" fill="none" stroke="#1f2428" stroke-width="4" stroke-linecap="round"/>
    <!-- white paws -->
    <circle cx="24" cy="28" r="2" fill="#f5f0e6"/>
    <circle cx="12" cy="28" r="2" fill="#f5f0e6"/>
    <circle cx="-7" cy="28" r="2" fill="#f5f0e6"/>
    <circle cx="9" cy="28" r="2" fill="#f5f0e6"/>
    <!-- head -->
    <circle cx="-8" cy="-1" r="9" fill="#1f2428"/>
    <!-- white blaze (Boston Terrier marking) -->
    <path d="M-12-3L-8-7L-4-3L-8 2Z" fill="#f5f0e6"/>
    <!-- muzzle -->
    <ellipse cx="-14" cy="2" rx="5" ry="4" fill="#f5f0e6"/>
    <ellipse cx="-15" cy="1.5" rx="2.5" ry="2" fill="#1f2428" opacity="0.6"/>
    <!-- nose -->
    <ellipse cx="-16" cy="0.5" rx="1.5" ry="1" fill="#333"/>
    <!-- eyes -->
    <circle cx="-11" cy="-3" r="2" fill="#f5f0e6"/>
    <circle cx="-11" cy="-3" r="1" fill="#1f2428"/>
    <circle cx="-5" cy="-3" r="2" fill="#f5f0e6"/>
    <circle cx="-5" cy="-3" r="1" fill="#1f2428"/>
    <!-- erect ears (signature) -->
    <polygon points="-12,-7 -14,-16 -8,-9" fill="#1f2428"/>
    <polygon points="-4,-7 -2,-16 -8,-9" fill="#1f2428"/>
    <!-- short tail -->
    <path d="M24 2L28-2" fill="none" stroke="#1f2428" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- HOUSE 4 (right of center) -->
  <g transform="translate(586,108)">
    <rect width="78" height="58" rx="5" fill="#f0e8d8"/>
    <polygon points="-5,5 39,-24 83,5" fill="#8756a0"/>
    <rect x="14" y="26" width="16" height="32" rx="3" fill="#ce835d"/>
    <circle cx="26" cy="44" r="2" fill="#d4a84b"/>
    <rect x="44" y="18" width="20" height="16" rx="2" fill="#d7ecff"/>
    <line x1="54" y1="18" x2="54" y2="34" stroke="#b5cde0" stroke-width="1"/>
    <line x1="44" y1="26" x2="64" y2="26" stroke="#b5cde0" stroke-width="1"/>
  </g>

  <!-- tree -->
  <g transform="translate(680,120)">
    <rect x="5" y="26" width="7" height="32" rx="2" fill="#7a6044"/>
    <ellipse cx="8" cy="20" rx="18" ry="22" fill="#5aaa5a"/>
    <ellipse cx="14" cy="24" rx="12" ry="15" fill="#68b868" opacity="0.7"/>
  </g>

  <!-- HOUSE 5 (far right) -->
  <g transform="translate(726,112)">
    <rect width="68" height="54" rx="4" fill="#e0ece0"/>
    <polygon points="-4,4 34,-22 72,4" fill="#d87744"/>
    <rect x="26" y="24" width="14" height="30" rx="3" fill="#87a17e"/>
    <circle cx="36" cy="42" r="2" fill="#d4a84b"/>
    <rect x="6" y="18" width="16" height="14" rx="2" fill="#cde4f6"/>
    <line x1="14" y1="18" x2="14" y2="32" stroke="#a8c4dc" stroke-width="1"/>
    <rect x="58" y="-10" width="8" height="18" rx="2" fill="#7b4a40"/>
  </g>

  <!-- tree far right -->
  <g transform="translate(812,126)">
    <rect x="4" y="22" width="6" height="28" rx="2" fill="#7a6044"/>
    <ellipse cx="7" cy="16" rx="14" ry="18" fill="#5aaa5a"/>
  </g>

  <!-- HOUSE 6 (edge, partial) -->
  <g transform="translate(858,114)">
    <rect width="70" height="52" rx="4" fill="#fff0e0"/>
    <polygon points="-4,4 35,-22 74,4" fill="#5a7eb5"/>
    <rect x="14" y="22" width="14" height="30" rx="3" fill="#7a8ea0"/>
    <rect x="42" y="18" width="16" height="14" rx="2" fill="#cde4f6"/>
  </g>

  <!-- more fence right -->
  <g opacity="0.3">
    <rect x="560" y="170" width="2" height="12" fill="#a08068"/>
    <rect x="570" y="170" width="2" height="12" fill="#a08068"/>
    <rect x="580" y="170" width="2" height="12" fill="#a08068"/>
    <rect x="559" y="173" width="24" height="2" rx="1" fill="#a08068"/>
    <rect x="559" y="178" width="24" height="2" rx="1" fill="#a08068"/>
  </g>

  <!-- bushes along sidewalk -->
  <g fill="#4da04d" opacity="0.5">
    <ellipse cx="50" cy="210" rx="14" ry="8"/>
    <ellipse cx="200" cy="208" rx="10" ry="6"/>
    <ellipse cx="750" cy="210" rx="12" ry="7"/>
    <ellipse cx="900" cy="208" rx="14" ry="8"/>
  </g>
</svg>
