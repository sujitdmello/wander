name: WanderWatch
options:
  bundleIdPrefix: com.example.wander
  deploymentTarget:
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  WanderWatch:
    type: application
    platform: watchOS
    sources:
      - path: "WanderWatch Watch App"
    settings:
      base:
        PRODUCT_NAME: WanderWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.example.wander.watchapp
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: "WanderWatch Watch App/Info.plist"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SKIP_INSTALL: NO
